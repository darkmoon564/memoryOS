services:
  # Database Service: PostgreSQL + pgvector
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: memoryos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Graph Database: Neo4j Community Edition
  neo4j-db:
    image: neo4j:5.16-community
    container_name: memoryos-neo4j
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474" # Neo4j Browser UI
      - "127.0.0.1:${NEO4J_PORT:-7687}:7687" # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      # Constrain RAM resources on developer machine
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      # The API's startup and /readyz perform the authenticated Neo4j query.
      # At the container layer, a Bolt socket check avoids cypher-shell hanging
      # during health checks on constrained Docker Desktop installations.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/7687'"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 60s

  migrate:
    build:
      context: .
      args:
        # The default image is deliberately light enough for local durable
        # integration checks.  Set MEMORYOS_INSTALL_ML=true together with
        # MEMORYOS_OFFLINE_MODE=false for the full local semantic runtime.
        INSTALL_ML: "${MEMORYOS_INSTALL_ML:-false}"
    command: ["python", "-m", "memoryos.migrations", "upgrade"]
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      NEO4J_URI: bolt://neo4j-db:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      MEMORYOS_ALLOW_IN_MEMORY_FALLBACK: "false"
      OFFLINE_MODE: "${MEMORYOS_OFFLINE_MODE:-true}"
    depends_on:
      postgres-db:
        condition: service_healthy
      neo4j-db:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      args:
        INSTALL_ML: "${MEMORYOS_INSTALL_ML:-false}"
    command: ["uvicorn", "memoryos.main:app", "--host", "0.0.0.0", "--port", "8088"]
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      NEO4J_URI: bolt://neo4j-db:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      MEMORYOS_ALLOW_IN_MEMORY_FALLBACK: "false"
      OFFLINE_MODE: "${MEMORYOS_OFFLINE_MODE:-true}"
    ports:
      - "127.0.0.1:${MEMORYOS_PORT:-8088}:8088"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  worker:
    build:
      context: .
      args:
        INSTALL_ML: "${MEMORYOS_INSTALL_ML:-false}"
    command: ["python", "-m", "memoryos.worker", "--interval", "5", "--batch-size", "100"]
    environment:
      POSTGRES_HOST: postgres-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-memoryos}
      POSTGRES_USER: ${POSTGRES_USER:-memoryos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      NEO4J_URI: bolt://neo4j-db:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      MEMORYOS_ALLOW_IN_MEMORY_FALLBACK: "false"
      OFFLINE_MODE: "${MEMORYOS_OFFLINE_MODE:-true}"
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
